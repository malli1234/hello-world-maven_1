apiVersion: v1
kind: Service
metadata:
  name: {{ include "__APP_NAME__.fullname" . }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
  selector:
    app: {{ include "__APP_NAME__.fullname" . }}
